apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${PROJECT_NAME}-inference
  namespace: ${K8S_NAMESPACE}
  labels:
    app: ${PROJECT_NAME}-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${PROJECT_NAME}-inference
  template:
    metadata:
      labels:
        app: ${PROJECT_NAME}-inference
    spec:
      containers:
        - name: inference
          image: ${IMAGE_NAME}-inference-arm64:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_DIR
              value: /app/output/model
            - name: OUTPUT_DIR
              value: /app/output
